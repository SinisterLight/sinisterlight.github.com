<!doctype html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ .Site.Params.title }} — {{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}Shobhit Srivastava — writing on software, systems, and how teams build them.{{ end }}">
<link rel="canonical" href="{{ .Permalink }}">
<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Params.title }}{{ else }}{{ .Title }}{{ end }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta name="twitter:card" content="summary">
{{ with .Site.Params.twitterHandle }}<meta name="twitter:creator" content="@{{ . }}">{{ end }}
<link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ "index.xml" | absURL }}">
<link rel="stylesheet" href="{{ "css/fonts.css" | relURL }}">
<link rel="stylesheet" href="{{ "css/site.css" | relURL }}?v={{ now.Unix }}">
</head>
<body>

<nav class="nav">
  <div class="in">
    <a class="name brand" href="{{ "/" | relURL }}" aria-label="Sinister Light — home">
      <svg class="homeicon" viewBox="0 0 24 24" aria-hidden="true"><defs><radialGradient id="hg" cx="50%" cy="57%" r="53%"><stop offset="0%" stop-color="#FBE3A8"/><stop offset="55%" stop-color="#EFB45C" stop-opacity=".72"/><stop offset="100%" stop-color="#EFB45C" stop-opacity="0"/></radialGradient><clipPath id="hc"><path d="M4.6 10.6 L12 4 L19.4 10.6 V19.6 H4.6 Z"/></clipPath></defs><g clip-path="url(#hc)"><rect width="24" height="24" fill="url(#hg)"/></g><rect x="10.3" y="12.5" width="3.4" height="4.4" rx="0.6" fill="#F4C667"/><path d="M3 11.5 12 4l9 7.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 10v9.6h14V10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Sinister Light</span>
    </a>
    <div class="burger" aria-label="Menu" role="button" tabindex="0"><span></span><span></span><span></span></div>
    <div class="links">
      <a href="{{ "/post/" | relURL }}"{{ if eq .Section "post" }} class="on"{{ end }}>Writing</a>
      <a href="{{ "/talks/" | relURL }}"{{ if eq .Section "talks" }} class="on"{{ end }}>Talks</a>
      <a href="{{ "/about/" | relURL }}"{{ if eq .Section "about" }} class="on"{{ end }}>About</a>
      <a href="https://shovel.company" target="_blank" rel="noopener">Shovel</a>
    </div>
  </div>
</nav>

{{ block "main" . }}{{ end }}

<footer>
  <div class="in">
    <span>© {{ now.Format "2006" }} Shobhit Srivastava</span>
    <span>Bangalore</span>
  </div>
</footer>

<script>
(function(){
  var b=document.querySelector('.burger'),l=document.querySelector('.nav .links');
  if(b&&l){var t=function(){l.classList.toggle('open')};b.addEventListener('click',t);
    b.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();t()}});}
})();
</script>
</body>
</html>
