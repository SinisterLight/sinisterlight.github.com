DefaultContentLanguage = "en"
title = "Sinister Light"
# Theme replaced by the project-level layouts/ (custom cream/sienna theme).
summarylength = 10
enableEmoji = true
publishDir= "public"

# Enable Disqus (comments preserved)
disqusShortname = "SinisterLight"

[params]
title = "Shobhit Srivastava"
author = "Sinister Light"
description = "Shobhit Srivastava — writing on software, systems, and how teams build them."
profilePicture = "images/profile.png"
keywords = "Sinister Light Shobhit Srivastava"
favicon = "favicons/"
customCss = []
mainSections = ["post"]
twitterHandle = "Sinister_Light"
# Google Analytics 4 (replaces the dead UA-37091031-1 dropped in the redesign)
googleAnalytics = "G-NNWN37DF3G"

## Math settings
[params.math]
enable = false  # options: true, false. Enable math support globally, default: false. You can always enable math on per page.
use = "katex"  # options: "katex", "mathjax". default is "katex".

